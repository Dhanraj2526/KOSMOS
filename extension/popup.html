<!DOCTYPE html>
<html>

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1 class="title">KOSMOS</h1>
      <div class="header-right">
        <button id="sidebarBtn" class="sidebar-toggle" title="Switch to Sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
        <div class="status">
          <span class="dot"></span> SECURE PORTAL
        </div>
      </div>
    </div>

    <div class="main">
      <p class="desc">Secure your assets on the immutable ledger instantly.</p>

      <button id="openSite" class="btn-primary">OPEN DASHBOARD</button>

      <div class="divider">OR</div>

      <div class="upload-zone" id="uploadZone">
        <p>DROP FILE TO SECURE</p>
      </div>
    </div>

    <div class="footer">
      <p>POWERED BY SEPOLIA & IPFS</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
